# Nombre de la aplicacion
spring.application.name=RestauranteAruba
# Definir el puerto con el cual se accedera a la aplicacion
server.port=8090
# Url del proyecto
server.servlet.context-path=/aruba

# Conexion a MySQL: valores por defecto pensados para un MySQL local recien instalado.
# Si tu usuario/clave/puerto son distintos, NO edites este archivo: sobreescribe con
# variables de entorno (Spring las mapea automaticamente), por ejemplo:
#   SPRING_DATASOURCE_USERNAME=root
#   SPRING_DATASOURCE_PASSWORD=tu_clave
#   SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/aruba_db
spring.datasource.url=jdbc:mysql://localhost:3306/aruba_db
spring.datasource.username=root
spring.datasource.password=Sebastian13

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway gestiona el esquema; Hibernate solo valida que las entidades coincidan
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
