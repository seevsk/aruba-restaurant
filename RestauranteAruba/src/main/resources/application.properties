# Nombre de la aplicacion
spring.application.name=RestauranteAruba
# Definir el puerto con el cual se accedera a la aplicacion
server.port=8090
# Url del proyecto
server.servlet.context-path=/aruba

spring.datasource.url=jdbc:mysql://localhost:3306/aruba_db
spring.datasource.username=root
spring.datasource.password=12345678

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway gestiona el esquema; Hibernate solo valida que las entidades coincidan
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate