<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Proveedores')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='proveedores')}"></nav>
<main class="content">
    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Catálogo · Simple</div>
            <h1 th:text="${proveedor.id == null} ? 'Registrar proveedor' : 'Actualizar proveedor'"></h1>
        </div>
        <a class="btn btn--ghost" th:href="@{/proveedores}">← Volver</a>
    </div>

    <div class="card" style="max-width: 720px;">
        <form method="post" th:action="@{/proveedores/guardar}" th:object="${proveedor}">
            <input type="hidden" th:if="${proveedor.id != null}" th:field="*{id}" />

            <div class="form-grid">
                <div class="field" th:classappend="${#fields.hasErrors('ruc')} ? 'field--invalid' : ''">
                    <label for="ruc">RUC</label>
                    <input type="text" id="ruc" th:field="*{ruc}" maxlength="11" placeholder="20111111111" />
                    <div class="error" th:if="${#fields.hasErrors('ruc')}" th:errors="*{ruc}"></div>
                </div>
                <div class="field" th:classappend="${#fields.hasErrors('razonSocial')} ? 'field--invalid' : ''">
                    <label for="razonSocial">Razón social</label>
                    <input type="text" id="razonSocial" th:field="*{razonSocial}" placeholder="Ej. Distribuidora Lima SAC" />
                    <div class="error" th:if="${#fields.hasErrors('razonSocial')}" th:errors="*{razonSocial}"></div>
                </div>
                <div class="field">
                    <label for="apellidoPaterno">Apellido paterno (opcional)</label>
                    <input type="text" id="apellidoPaterno" th:field="*{apellidoPaterno}" />
                </div>
                <div class="field">
                    <label for="apellidoMaterno">Apellido materno (opcional)</label>
                    <input type="text" id="apellidoMaterno" th:field="*{apellidoMaterno}" />
                </div>
                <div class="field" th:classappend="${#fields.hasErrors('telefono')} ? 'field--invalid' : ''">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" th:field="*{telefono}" placeholder="999111111" />
                    <div class="error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                </div>
                <div class="field" th:classappend="${#fields.hasErrors('correo')} ? 'field--invalid' : ''">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" th:field="*{correo}" placeholder="ventas@proveedor.com" />
                    <div class="error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></div>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn--primary" type="submit">Guardar</button>
                <a class="btn btn--ghost" th:href="@{/proveedores}">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
