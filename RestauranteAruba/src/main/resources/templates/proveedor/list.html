<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Proveedores')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='proveedores')}"></nav>
<main class="content">
    <div th:if="${mensaje}" class="alert alert--success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <nav class="breadcrumb">
        <a th:href="@{/}">Inicio</a>
        <span class="breadcrumb__sep">›</span>
        <span class="breadcrumb__current" th:text="'Proveedores'"></span>
    </nav>
    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Catálogo</div>
            <h1>Proveedores</h1>
            <p>Quiénes abastecen los insumos de la despensa.</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <a class="btn btn--ghost" th:href="@{/}">← Volver</a>
            <a class="btn btn--primary" th:href="@{/proveedores/nuevo}">+ Registrar</a>
        </div>
    </div>

    <form class="search-form" method="get" th:action="@{/proveedores}">
        <input type="text" name="buscar" placeholder="Buscar por RUC o razón social..." th:value="${buscar}" />
        <button class="btn btn--ghost" type="submit">Buscar</button>
    </form>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th class="num">Cod.</th>
                <th>RUC</th>
                <th>Razón social</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${proveedores}">
                <td class="num" th:text="${item.id}"></td>
                <td class="num" th:text="${item.ruc}"></td>
                <td th:text="${item.razonSocial}"></td>
                <td th:text="${item.telefono}"></td>
                <td th:text="${item.correo}"></td>
                <td>
                    <span th:if="${item.estado}" class="stub">Habilitado</span>
                    <span th:unless="${item.estado}" class="stub stub--off">Deshabilitado</span>
                </td>
                <td class="actions">
                    <a class="btn btn--ghost btn--sm" th:href="@{/proveedores/{id}/editar(id=${item.id})}">Editar</a>
                    <form method="post" th:if="${item.estado}" th:action="@{/proveedores/{id}/deshabilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Deshabilitar</button>
                    </form>
                    <form method="post" th:unless="${item.estado}" th:action="@{/proveedores/{id}/habilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Habilitar</button>
                    </form>
                    <form method="post" th:action="@{/proveedores/{id}/eliminar(id=${item.id})}" onsubmit="return confirm('¿Eliminar este registro?');">
                        <button class="btn btn--danger btn--sm" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="empty-state" th:if="${#lists.isEmpty(proveedores)}">
            <strong>Sin resultados</strong>
            Todavía no hay proveedores registrados.
        </div>
    </div>
</main>
</body>
</html>
