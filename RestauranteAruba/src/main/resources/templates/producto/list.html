<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Productos')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='productos')}"></nav>
<main class="content">
    <div th:if="${mensaje}" class="alert alert--success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <nav class="breadcrumb">
        <a th:href="@{/}">Inicio</a>
        <span class="breadcrumb__sep">›</span>
        <span class="breadcrumb__current" th:text="'Productos'"></span>
    </nav>
    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Gestión</div>
            <h1>Productos</h1>
            <p>La carta: cada producto pertenece a una categoría.</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <a class="btn btn--ghost" th:href="@{/}">← Volver</a>
            <a class="btn btn--primary" th:href="@{/productos/nuevo}">+ Registrar</a>
        </div>
    </div>

    <form class="search-form" method="get" th:action="@{/productos}">
        <input type="text" name="buscar" placeholder="Buscar por nombre..." th:value="${buscar}" />
        <button class="btn btn--ghost" type="submit">Buscar</button>
    </form>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th class="num">Cod.</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th class="num">Precio</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${productos}">
                <td class="num" th:text="${item.id}"></td>
                <td th:text="${item.nombre}"></td>
                <td th:text="${item.categoria.nombre}"></td>
                <td class="num" th:text="${'S/ ' + #numbers.formatDecimal(item.precio, 1, 2)}"></td>
                <td>
                    <span th:if="${item.estado}" class="stub">Habilitado</span>
                    <span th:unless="${item.estado}" class="stub stub--off">Deshabilitado</span>
                </td>
                <td class="actions">
                    <a class="btn btn--ghost btn--sm" th:href="@{/productos/{id}/editar(id=${item.id})}">Editar</a>
                    <form method="post" th:if="${item.estado}" th:action="@{/productos/{id}/deshabilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Deshabilitar</button>
                    </form>
                    <form method="post" th:unless="${item.estado}" th:action="@{/productos/{id}/habilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Habilitar</button>
                    </form>
                    <form method="post" th:action="@{/productos/{id}/eliminar(id=${item.id})}" onsubmit="return confirm('¿Eliminar este registro?');">
                        <button class="btn btn--danger btn--sm" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="empty-state" th:if="${#lists.isEmpty(productos)}">
            <strong>Sin resultados</strong>
            Todavía no hay productos registrados.
        </div>
    </div>
</main>
</body>
</html>
