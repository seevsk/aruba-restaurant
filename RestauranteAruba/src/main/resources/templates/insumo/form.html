<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Insumos')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='insumos')}"></nav>
<main class="content">
    <nav class="breadcrumb">
        <a th:href="@{/}">Inicio</a>
        <span class="breadcrumb__sep">›</span>
        <a th:href="@{/insumos}">Insumos</a>
        <span class="breadcrumb__sep">›</span>
        <span class="breadcrumb__current">Registrar / Actualizar</span>
    </nav>

    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Gestión</div>
            <h1 th:text="${insumo.id == null} ? 'Registrar insumo' : 'Actualizar insumo'"></h1>
        </div>
        <a class="btn btn--ghost" th:href="@{/insumos}">← Volver</a>
    </div>

    <div class="card">
        <form method="post" th:action="@{/insumos/guardar}" th:object="${insumo}">
            <input type="hidden" th:if="${insumo.id != null}" th:field="*{id}" />

            <div class="field" th:classappend="${#fields.hasErrors('nombre')} ? 'field--invalid' : ''">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej. Arroz" />
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="field" th:classappend="${#fields.hasErrors('proveedor')} ? 'field--invalid' : ''">
                <label for="proveedor">Proveedor</label>
                <select id="proveedor" th:field="*{proveedor.id}">
                    <option value="">Seleccionar...</option>
                    <option th:each="p : ${proveedores}" th:value="${p.id}" th:text="${p.razonSocial}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('proveedor')}" th:errors="*{proveedor}"></div>
            </div>

            <div class="form-grid">
                <div class="field" th:classappend="${#fields.hasErrors('stock')} ? 'field--invalid' : ''">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" step="0.01" min="0" th:field="*{stock}" placeholder="50.00" />
                    <div class="error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                </div>
                <div class="field" th:classappend="${#fields.hasErrors('unidadMedida')} ? 'field--invalid' : ''">
                    <label for="unidadMedida">Unidad de medida</label>
                    <input type="text" id="unidadMedida" th:field="*{unidadMedida}" placeholder="kg, lt, und" />
                    <div class="error" th:if="${#fields.hasErrors('unidadMedida')}" th:errors="*{unidadMedida}"></div>
                </div>
                <div class="field field--full">
                    <label for="fechaVencimiento">Fecha de vencimiento (opcional)</label>
                    <input type="date" id="fechaVencimiento" th:field="*{fechaVencimiento}" />
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn--primary" type="submit">Guardar</button>
                <a class="btn btn--ghost" th:href="@{/insumos}">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
