<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Comprobantes')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='comprobantes')}"></nav>
<main class="content">
    <div th:if="${mensaje}" class="alert alert--success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <nav class="breadcrumb">
        <a th:href="@{/}">Inicio</a>
        <span class="breadcrumb__sep">›</span>
        <span class="breadcrumb__current" th:text="'Comprobantes'"></span>
    </nav>
    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Pedidos · Transaccional</div>
            <h1>Comprobantes</h1>
            <p>Boletas y facturas emitidas por cada pedido cobrado.</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <a class="btn btn--ghost" th:href="@{/}">← Volver</a>
            <a class="btn btn--primary" th:href="@{/comprobantes/nuevo}">+ Registrar</a>
        </div>
    </div>

    <form class="search-form" method="get" th:action="@{/comprobantes}">
        <input type="text" name="buscar" placeholder="Buscar por tipo, serie o número..." th:value="${buscar}" />
        <button class="btn btn--ghost" type="submit">Buscar</button>
    </form>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th class="num">Cod.</th>
                <th>Tipo</th>
                <th>Serie-Número</th>
                <th>Fecha</th>
                <th class="num">Total</th>
                <th>Método de pago</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${comprobantes}">
                <td class="num" th:text="${item.id}"></td>
                <td th:text="${item.tipo}"></td>
                <td class="num" th:text="${item.serie} + '-' + ${item.numero}"></td>
                <td th:text="${#temporals.format(item.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                <td class="num" th:text="${'S/ ' + #numbers.formatDecimal(item.total, 1, 2)}"></td>
                <td th:text="${item.metodoPago.nombre}"></td>
                <td>
                    <span th:if="${item.estado}" class="stub">Habilitado</span>
                    <span th:unless="${item.estado}" class="stub stub--off">Deshabilitado</span>
                </td>
                <td class="actions">
                    <a class="btn btn--ghost btn--sm" th:href="@{/comprobantes/{id}/editar(id=${item.id})}">Editar</a>
                    <form method="post" th:if="${item.estado}" th:action="@{/comprobantes/{id}/deshabilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Deshabilitar</button>
                    </form>
                    <form method="post" th:unless="${item.estado}" th:action="@{/comprobantes/{id}/habilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Habilitar</button>
                    </form>
                    <form method="post" th:action="@{/comprobantes/{id}/eliminar(id=${item.id})}" onsubmit="return confirm('¿Eliminar este registro?');">
                        <button class="btn btn--danger btn--sm" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="empty-state" th:if="${#lists.isEmpty(comprobantes)}">
            <strong>Sin resultados</strong>
            Todavía no hay comprobantes registrados.
        </div>
    </div>
</main>
</body>
</html>
