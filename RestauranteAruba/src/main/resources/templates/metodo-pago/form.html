<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Métodos de pago')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='metodos-pago')}"></nav>
<main class="content">
    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Catálogo · Simple</div>
            <h1 th:text="${metodoPago.id == null} ? 'Registrar método de pago' : 'Actualizar método de pago'"></h1>
        </div>
        <a class="btn btn--ghost" th:href="@{/metodos-pago}">← Volver</a>
    </div>

    <div class="card">
        <form method="post" th:action="@{/metodos-pago/guardar}" th:object="${metodoPago}">
            <input type="hidden" th:if="${metodoPago.id != null}" th:field="*{id}" />

            <div class="field" th:classappend="${#fields.hasErrors('nombre')} ? 'field--invalid' : ''">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej. Yape" />
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="form-actions">
                <button class="btn btn--primary" type="submit">Guardar</button>
                <a class="btn btn--ghost" th:href="@{/metodos-pago}">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
