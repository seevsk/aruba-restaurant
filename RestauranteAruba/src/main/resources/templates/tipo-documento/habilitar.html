<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Tipos de documento')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='tipos-documento')}"></nav>
<main class="content">
    <div th:if="${mensaje}" class="alert alert--success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <nav class="breadcrumb">
        <a th:href="@{/}">Inicio</a>
        <span class="breadcrumb__sep">›</span>
        <a th:href="@{/tipos-documento}">Tipos de documento</a>
        <span class="breadcrumb__sep">›</span>
        <span class="breadcrumb__current">Habilitar / Deshabilitar</span>
    </nav>
    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Catálogo</div>
            <h1>Habilitar / Deshabilitar Tipos de documento</h1>
            <p>Todos los tipos de documento, habilitados y deshabilitados.</p>
        </div>
        <a class="btn btn--ghost" th:href="@{/tipos-documento}">← Volver al listado</a>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th class="num">Cod.</th>
                <th>Nombre</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${tiposDocumento}">
                <td class="num" th:text="${item.id}"></td>
                <td th:text="${item.nombre}"></td>
                <td>
                    <span th:if="${item.estado}" class="stub">Habilitado</span>
                    <span th:unless="${item.estado}" class="stub stub--off">Deshabilitado</span>
                </td>
                <td class="actions">
                    <form method="post" th:if="${item.estado}" th:action="@{/tipos-documento/{id}/deshabilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Deshabilitar</button>
                    </form>
                    <form method="post" th:unless="${item.estado}" th:action="@{/tipos-documento/{id}/habilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Habilitar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="empty-state" th:if="${#lists.isEmpty(tiposDocumento)}">
            <strong>Sin resultados</strong>
            No hay tipos de documento registrados.
        </div>
    </div>
</main>
</body>
</html>
