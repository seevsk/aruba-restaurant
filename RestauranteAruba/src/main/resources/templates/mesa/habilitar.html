<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(titulo='Mesas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(activo='mesas')}"></nav>
<main class="content">
    <div th:if="${mensaje}" class="alert alert--success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <nav class="breadcrumb">
        <a th:href="@{/}">Inicio</a>
        <span class="breadcrumb__sep">›</span>
        <a th:href="@{/mesas}">Mesas</a>
        <span class="breadcrumb__sep">›</span>
        <span class="breadcrumb__current">Habilitar / Deshabilitar</span>
    </nav>
    <div class="page-head">
        <div>
            <div class="page-head__eyebrow">Catálogo</div>
            <h1>Habilitar / Deshabilitar Mesas</h1>
            <p>Todas las mesas, disponibles, ocupadas y deshabilitadas.</p>
        </div>
        <a class="btn btn--ghost" th:href="@{/mesas}">← Volver al listado</a>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th class="num">Cod.</th>
                <th>Número</th>
                <th class="num">Capacidad</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${mesas}">
                <td class="num" th:text="${item.id}"></td>
                <td th:text="${item.numero}"></td>
                <td class="num" th:text="${item.capacidad}"></td>
                <td>
                    <span th:if="${item.estado == 'DISPONIBLE'}" class="stub">Disponible</span>
                    <span th:if="${item.estado == 'OCUPADA'}" class="stub stub--busy">Ocupada</span>
                    <span th:if="${item.estado == 'INACTIVO'}" class="stub stub--off">Deshabilitada</span>
                </td>
                <td class="actions">
                    <form method="post" th:if="${item.estado != 'INACTIVO'}" th:action="@{/mesas/{id}/deshabilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Deshabilitar</button>
                    </form>
                    <form method="post" th:if="${item.estado == 'INACTIVO'}" th:action="@{/mesas/{id}/habilitar(id=${item.id})}">
                        <button class="btn btn--ghost btn--sm" type="submit">Habilitar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="empty-state" th:if="${#lists.isEmpty(mesas)}">
            <strong>Sin resultados</strong>
            No hay mesas registradas.
        </div>
    </div>
</main>
</body>
</html>
